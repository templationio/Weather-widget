<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Weather Widget</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      /* Transparent background for Notion */
      background-color: transparent; 
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Container for Liquid animations and cards */
    .widget-container {
      position: relative;
      width: 100%;
      max-width: 700px;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- LIQUID BACKGROUND --- */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      z-index: -1;
      opacity: 0.7;
      animation: float 10s infinite alternate ease-in-out;
    }

    .blob-1 {
      width: 250px;
      height: 250px;
      background: #4facfe;
      top: -50px;
      left: 10%;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 300px;
      height: 300px;
      background: #00f2fe;
      bottom: -80px;
      right: 10%;
      animation-delay: -3s;
    }

    .blob-3 {
      width: 200px;
      height: 200px;
      background: #cd9cf2;
      top: 30%;
      left: 40%;
      animation-delay: -5s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -40px) scale(1.1); }
    }

    /* --- GLASSMORPHIC CARDS --- */
    .cards-wrapper {
      display: flex;
      gap: 20px;
      z-index: 1;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 24px;
      width: 190px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* Typography */
    .location-name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.9;
      margin-bottom: 4px;
    }

    .date {
      font-size: 12px;
      font-weight: 300;
      opacity: 0.7;
      margin-bottom: 16px;
    }

    .weather-icon {
      font-size: 48px;
      margin-bottom: 12px;
      text-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .current-temp {
      font-size: 36px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 8px;
    }

    .minmax-temp {
      font-size: 13px;
      font-weight: 400;
      opacity: 0.8;
      background: rgba(0, 0, 0, 0.2);
      padding: 4px 12px;
      border-radius: 12px;
      white-space: nowrap;
    }

    /* Loader */
    .loading {
      font-size: 14px;
      opacity: 0.7;
      text-align: center;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="widget-container">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="cards-wrapper" id="cards-container">
      <div class="loading">Loading weather data...</div>
    </div>
  </div>

  <script>
    // Location settings (Coordinates: Berlin, Dubai, Los Angeles)
    const locations = [
      { id: 'germany', name: 'Germany', lat: 52.5200, lon: 13.4050 },
      { id: 'dubai', name: 'Dubai', lat: 25.2048, lon: 55.2708 },
      { id: 'california', name: 'California', lat: 34.0522, lon: -118.2437 }
    ];

    // Format current date in English
    const dateOptions = { weekday: 'short', month: 'short', day: 'numeric' };
    const todayDate = new Date().toLocaleDateString('en-US', dateOptions);

    // Function to get WMO weather icon
    function getWeatherIcon(code) {
      if (code === 0) return '☀️'; // Clear
      if (code === 1 || code === 2) return '🌤️'; // Partly cloudy
      if (code === 3) return '☁️'; // Overcast
      if (code >= 45 && code <= 48) return '🌫️'; // Fog
      if (code >= 51 && code <= 67) return '🌧️'; // Rain
      if (code >= 71 && code <= 82) return '❄️'; // Snow
      if (code >= 95) return '⛈️'; // Thunderstorm
      return '🌡️';
    }

    async function fetchWeather() {
      const container = document.getElementById('cards-container');
      container.innerHTML = ''; // Clear loader

      for (const loc of locations) {
        try {
          // Fetch from Open-Meteo API
          const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=auto`;
          const response = await fetch(url);
          const data = await response.json();

          const currentTemp = Math.round(data.current_weather.temperature);
          const maxTemp = Math.round(data.daily.temperature_2m_max[0]);
          const minTemp = Math.round(data.daily.temperature_2m_min[0]);
          const weatherCode = data.current_weather.weathercode;
          const icon = getWeatherIcon(weatherCode);

          // Create card
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="location-name">${loc.name}</div>
            <div class="date">${todayDate}</div>
            <div class="weather-icon">${icon}</div>
            <div class="current-temp">${currentTemp}°</div>
            <div class="minmax-temp">H: ${maxTemp}° | L: ${minTemp}°</div>
          `;
          container.appendChild(card);
        } catch (error) {
          console.error(`Error fetching data for ${loc.name}:`, error);
        }
      }
    }

    // Run on load
    fetchWeather();
    
    // Update data every 30 minutes (1800000 ms)
    setInterval(fetchWeather, 1800000);
  </script>
</body>
</html>
