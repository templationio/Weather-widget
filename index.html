<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Weather Widget</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

    /* CSS Variables for Dark Theme (Default) */
    :root {
      --bg-color: #191919;
      --text-color: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.1);
      --card-shadow: rgba(0, 0, 0, 0.2);
      --minmax-bg: rgba(0, 0, 0, 0.2);
      --blob-opacity: 0.6;
      
      /* Theme Button Variables */
      --toggle-bg: rgba(255, 255, 255, 0.06);
      --toggle-border: rgba(255, 255, 255, 0.15);
      --toggle-hover: rgba(255, 255, 255, 0.12);
    }

    /* CSS Variables for Light Theme */
    body.light-theme {
      --bg-color: #ffffff;
      --text-color: #37352f;
      --card-bg: rgba(255, 255, 255, 0.5);
      --card-border: rgba(0, 0, 0, 0.08);
      --card-shadow: rgba(0, 0, 0, 0.06);
      --minmax-bg: rgba(0, 0, 0, 0.05);
      --blob-opacity: 0.4;
      
      /* Theme Button Variables */
      --toggle-bg: rgba(0, 0, 0, 0.03);
      --toggle-border: rgba(0, 0, 0, 0.08);
      --toggle-hover: rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    /* Container */
    .widget-container {
      position: relative;
      width: 100%;
      max-width: 400px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* --- LIQUID BACKGROUND --- */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(50px);
      z-index: -1;
      opacity: var(--blob-opacity);
      animation: float 10s infinite alternate ease-in-out;
      transition: opacity 0.4s ease;
    }

    .blob-1 {
      width: 200px;
      height: 200px;
      background: #4facfe;
      top: -20px;
      left: 10%;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 250px;
      height: 250px;
      background: #cd9cf2;
      bottom: -40px;
      right: 10%;
      animation-delay: -3s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(20px, -30px) scale(1.1); }
    }

    /* --- GLASSMORPHIC CARD --- */
    .cards-wrapper {
      display: flex;
      z-index: 1;
      justify-content: center;
      width: 100%;
      margin-bottom: 24px;
    }

    .card {
      position: relative; 
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 32px 24px 28px;
      width: 220px;
      box-shadow: 0 8px 32px 0 var(--card-shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.4s ease;
    }

    /* Intuitive UI Button Inside Card */
    .theme-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 10;
      color: var(--text-color);
    }

    .theme-toggle:hover {
      background: var(--toggle-hover);
      transform: scale(1.1);
    }

    /* Typography */
    .location-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.9;
      margin-bottom: 6px;
    }

    .date {
      font-size: 13px;
      font-weight: 300;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .weather-icon {
      font-size: 56px;
      margin-bottom: 16px;
      text-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    .current-temp {
      font-size: 42px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 12px;
    }

    .minmax-temp {
      font-size: 14px;
      font-weight: 400;
      opacity: 0.8;
      background: var(--minmax-bg);
      padding: 6px 16px;
      border-radius: 12px;
      white-space: nowrap;
      transition: background 0.4s ease;
    }

    /* Footer */
    .footer {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.5px;
      opacity: 0.5;
      z-index: 1;
      transition: opacity 0.3s ease;
    }

    .footer:hover {
      opacity: 0.8;
    }

    /* Loader */
    .loading {
      font-size: 14px;
      opacity: 0.7;
      text-align: center;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="widget-container">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="cards-wrapper" id="cards-container">
      <div class="loading">Loading weather data...</div>
    </div>

    <div class="footer">Powered by templation.io</div>
  </div>

  <script>
    // --- THEME SWITCHER LOGIC ---
    let isLightMode = localStorage.getItem('notion-widget-theme') === 'light';

    function applyTheme() {
      if (isLightMode) {
        document.body.classList.add('light-theme');
      } else {
        document.body.classList.remove('light-theme');
      }
      const btn = document.querySelector('.theme-toggle');
      if (btn) btn.textContent = isLightMode ? '🌙' : '☀️';
    }

    window.toggleTheme = function() {
      isLightMode = !isLightMode;
      localStorage.setItem('notion-widget-theme', isLightMode ? 'light' : 'dark');
      applyTheme();
    };

    applyTheme();

    // --- WEATHER LOGIC ---
    const locations = [
      { id: 'berlin', name: 'Berlin', lat: 52.5200, lon: 13.4050 }
    ];

    const dateOptions = { weekday: 'short', month: 'short', day: 'numeric' };
    const todayDate = new Date().toLocaleDateString('en-US', dateOptions);

    function getWeatherIcon(code) {
      if (code === 0) return '☀️'; 
      if (code === 1 || code === 2) return '🌤️'; 
      if (code === 3) return '☁️'; 
      if (code >= 45 && code <= 48) return '🌫️'; 
      if (code >= 51 && code <= 67) return '🌧️'; 
      if (code >= 71 && code <= 82) return '❄️'; 
      if (code >= 95) return '⛈️'; 
      return '🌡️';
    }

    async function fetchWeather() {
      const container = document.getElementById('cards-container');
      
      if (container.querySelector('.loading')) {
        container.innerHTML = ''; 
      }

      for (const loc of locations) {
        try {
          const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=auto`;
          const response = await fetch(url);
          const data = await response.json();

          const currentTemp = Math.round(data.current_weather.temperature);
          const maxTemp = Math.round(data.daily.temperature_2m_max[0]);
          const minTemp = Math.round(data.daily.temperature_2m_min[0]);
          const weatherCode = data.current_weather.weathercode;
          const icon = getWeatherIcon(weatherCode);
          
          const themeIcon = isLightMode ? '🌙' : '☀️';

          container.innerHTML = `
            <div class="card">
              <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme" title="Toggle Theme">${themeIcon}</button>
              <div class="location-name">${loc.name}</div>
              <div class="date">${todayDate}</div>
              <div class="weather-icon">${icon}</div>
              <div class="current-temp">${currentTemp}°</div>
              <div class="minmax-temp">H: ${maxTemp}° | L: ${minTemp}°</div>
            </div>
          `;
        } catch (error) {
          console.error(`Error fetching data for ${loc.name}:`, error);
          container.innerHTML = '<div class="loading">Error loading data.</div>';
        }
      }
    }

    fetchWeather();
    setInterval(fetchWeather, 1800000); 
  </script>
</body>
</html>
